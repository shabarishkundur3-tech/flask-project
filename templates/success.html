<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success</title>
    <style>
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .checkmark {
            font-size: 60px;
            margin-bottom: 1rem;
        }
        h2 {
            color: #2E7D32;
            margin-bottom: 0.75rem;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            padding: 10px 24px;
            background: #4A90E2;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        a:hover { background: #357ABD; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✅</div>
        <h2>Data Submitted Successfully!</h2>
        <p>Your data has been saved to the database.</p>
        <a href="/">Submit Another</a>
    </div>
</body>
</html>
